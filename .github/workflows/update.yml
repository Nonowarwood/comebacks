name: Mise à jour des comebacks

on:
  schedule:
    - cron: "17 */6 * * *"   # toutes les 6 heures
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scraper kpopofficial
        run: python3 scripts/update_data.py

      - name: Commit si changement
        run: |
          git config user.name "comeback-bot"
          git config user.email "actions@github.com"
          git add comebacks.json
          if git diff --cached --quiet; then
            echo "Rien de nouveau."
          else
            git commit -m "MAJ automatique des comebacks"
            git push
          fi
